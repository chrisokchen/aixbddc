dsl_steps:
  - format: 操作成功
    name: shared.operation-response-success-and-failure.operation-success
    handler: operation-response-success-and-failure
    target_part_path: specs/test-strategy.yml#shared_operation_response_success
    param_bindings: {}
    datatable_bindings: {}

  - format: 操作失敗
    name: shared.operation-response-success-and-failure.operation-failure
    handler: operation-response-success-and-failure
    target_part_path: specs/test-strategy.yml#shared_operation_response_failure
    param_bindings: {}
    datatable_bindings: {}

  - format: 操作失敗, 原因為 "{reason}"
    name: shared.operation-response-success-and-failure.operation-failure-reason
    handler: operation-response-success-and-failure
    target_part_path: specs/test-strategy.yml#shared_operation_response_failure_reason
    param_bindings:
      reason:
        target: response:$.error.reason
    datatable_bindings: {}

  - format: 現在時間為 "{now}"
    name: shared.time-control.now
    handler: time-control
    target_part_path: specs/test-strategy.yml#time_control
    param_bindings:
      now:
        target: literal:iso8601-instant
    datatable_bindings: {}
