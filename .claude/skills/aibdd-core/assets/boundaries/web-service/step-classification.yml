# web-service preset — Gherkin step → handler classification table
#
# Maps each Gherkin step's (keyword × sentence-part) to its semantic handler ID.
# Consumed by aibdd-red-execute (step-def implementation classification) and by
# aibdd-spec-by-example-analyze (SBE classification reference).
#
# Plan-time handler contracts (構造履約) live in ../plugin-contract.md.
# Runtime handler implementation contracts live in handlers/*.md.

routes:
  - part: state-builder
    keyword:
      - Given
      - Background
    handler: state-builder
    semantic: Prepare persisted backend state through repository-level setup.

  - part: operation-invoke
    keyword:
      - Given
      - When
    handler: operation-invoke
    semantic: Invoke a backend operation through the backend API. The operation contract decides HTTP method, request assembly, and whether the operation is read-only or mutating. Given usage is prerequisite setup; When usage is the target operation.

  - part: operation-response-success-and-failure
    keyword:
      - Then
    handler: operation-response-success-and-failure
    semantic: Verify success, failure, status, or error result from the captured operation response.

  - part: operation-response-success-readmodel
    keyword:
      - Then
    handler: operation-response-success-readmodel
    semantic: Verify response payload fields from the captured backend response.

  - part: state-verifier
    keyword:
      - Then
    handler: state-verifier
    semantic: Verify persisted backend state after a mutation.

  - part: time-control
    keyword:
      - Given
      - When
    handler: time-control
    semantic: Control boundary-visible time for time-dependent backend behavior.

  - part: external-stub
    keyword:
      - Given
    handler: external-stub
    semantic: Control backend-visible external resources through test-strategy-backed stubs.
