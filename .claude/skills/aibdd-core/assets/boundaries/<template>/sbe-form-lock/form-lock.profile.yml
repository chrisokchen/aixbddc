# =============================================================================
# form-lock automation profile — <boundary-id>（authoring template）
# =============================================================================
#
# sbe-form-lock/ 是選用目錄：只有當此 boundary 需要在 SBE 階段做「Example / Scenario
# Outline 骨架插入」時才建（web-service 有；不需要的 boundary 不建）。
#
# Scope
#   只被 /aibdd-spec-by-example-analyze 的 01-example-form-lock 階段讀取。
#   這是宣告式的 boundary preset，不是 runtime truth；專案 active boundary
#   仍來自 specs/architecture/boundary.yml 的 type 欄位。
#
# Resolution（loader 行為）
#   1. 讀 boundary.yml → active boundary type。
#   2. 載入 boundaries/<type>/sbe-form-lock/form-lock.profile.yml。
#   3. 以本檔所在目錄（sbe-form-lock/）為基準解析 template 檔名。
#   4. loader 比對 rule_prefix 前，必須先以 rule_prefix 長度由長到短排序，避免短前綴
#      先吃掉應屬長前綴的 rule。
# =============================================================================

boundary_type: <boundary-id>

# rule headline 前綴 → 對應的 Example 骨架 template（.tmpl，與本檔同目錄）。
# 每個 rule type 一條對應。前綴文字需與專案的 rule 命名規約（four-rules-prefix）一致。
rule_prefix_to_template:
  - rule_prefix: "<rule-headline-prefix>"   # 例：前置（狀態
    template: <name>.tmpl                    # 例：precondition-state.tmpl

  # - rule_prefix: "前置（參數"
  #   template: precondition-param.tmpl
  # - rule_prefix: "後置（回應"
  #   template: postcondition-response.tmpl
  # - rule_prefix: "後置（狀態"
  #   template: postcondition-state.tmpl
