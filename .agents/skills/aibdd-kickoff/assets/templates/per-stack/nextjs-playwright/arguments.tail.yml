# -----------------------------------------------------------------------------
# Stack-specific tail (nextjs-playwright) — append 至 shared/.aibdd/arguments.yml 末尾
# -----------------------------------------------------------------------------

# STARTER_VARIANT — frontend variant id（由 /aibdd-auto-starter 分流）。
STARTER_VARIANT: nextjs-storybook-cucumber-e2e

# PRESET_KIND — boundary preset；frontend stack 必填。
PRESET_KIND: web-frontend

# PROJECT_SLUG — Storybook MCP 工具用 slug（${PROJECT_SLUG}-sb-mcp）。
PROJECT_SLUG: '${KICKOFF_TLB_ID}'

# TLB_ID — nextjs-playwright stack 下與 PROJECT_SLUG 等值。
# 用於展開 contract-as-SSOT 路徑（${SPECS_ROOT_DIR}/${TLB_ID}/contracts/components/...）。
TLB_ID: ${PROJECT_SLUG}

# -----------------------------------------------------------------------------
# 7. NEXTJS_PLAYWRIGHT_STARTER_OUTPUT_PATHS — walking skeleton 落點；由 /aibdd-auto-starter 產出。
# -----------------------------------------------------------------------------

FE_APP_DIR: src/app
FE_COMPONENTS_DIR: src/components
FE_LIB_DIR: src/lib
FE_API_CLIENT_FILE: ${FE_LIB_DIR}/api-client.ts
FE_SCHEMAS_DIR: ${FE_LIB_DIR}/schemas
FE_ENV_FILE: ${FE_LIB_DIR}/env.ts
FE_STORIES_DIR: src/stories
FE_FEATURES_DIR: features
FE_STEPS_DIR: ${FE_FEATURES_DIR}/steps
FE_FIXTURES_FILE: ${FE_STEPS_DIR}/fixtures.ts
FE_PLAYWRIGHT_CONFIG: playwright.config.ts
FE_STORYBOOK_CONFIG_DIR: .storybook
