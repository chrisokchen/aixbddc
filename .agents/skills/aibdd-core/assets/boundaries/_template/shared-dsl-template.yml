# =============================================================================
# <boundary-id> preset — shared-dsl-template.yml（authoring template）
# =============================================================================
#
# 這份檔是「shared DSL」種子：在 kickoff layout 階段，kickoff_layout.py 會把
# 本檔整份讀出、materialize 成專案的 specs/shared/dsl.yml。
#
# 「shared」= 那些不是由 part-driven fan-out（part_to_dsl.py）產生、而是整個
# boundary 共用的 DSL entry。典型：操作成功/失敗的通用 Then 句、時間控制、
# external stub 等「跨 feature 共用、由 kickoff 直接 seed」的 step。
#
# part-driven entry（依 contract/data spec 自動展開的那些）不放這裡，它們由
# scripts/part_to_dsl.py 在 /aibdd-plan 04-dsl-synthesis 階段產生。
#
# 每個 entry 的欄位 schema（與 part-driven template 同一套 DSL entry 形狀）：
#   format            : Gherkin step 業務句（actor-operation-object 句型；{key} 為占位）
#   name              : 全域唯一的 entry 名（建議 shared.<handler>.<slug>）
#   handler           : boundary 支援的 handler ID
#   target_part_path  : 此 step 綁定的 truth 錨點（shared 多半指向 test-strategy.yml#<section>）
#   param_bindings    : {key: {target: <uri-scheme:...>}}；inline 占位的綁定
#   datatable_bindings: {key: {target: <uri-scheme:...>}}；DataTable 欄位的綁定
# =============================================================================

dsl_steps:
  # 複製此區塊，逐條定義 boundary 共用 step。
  - format: <業務句，例：操作成功>
    name: shared.<handler-id>.<slug>
    handler: <handler-id>
    target_part_path: <truth-anchor，例：specs/test-strategy.yml#<section>>
    param_bindings: {}        # 無 inline 占位則留空 dict
    datatable_bindings: {}    # 無 DataTable 綁定則留空 dict

  # --- 範例（backend 常見 shared step；依你的 boundary 增刪）---------------------
