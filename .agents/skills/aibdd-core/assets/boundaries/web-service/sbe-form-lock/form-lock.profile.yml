# =============================================================================
# form-lock automation profile — web-service
# =============================================================================
#
# Scope
#   Consumed by /aibdd-spec-by-example-analyze phase 01-example-form-lock only.
#   Declarative boundary preset for Example／Scenario Outline skeleton insertion.
#   Not project runtime truth — project ActiveBoundary comes from
#   specs/architecture/boundary.yml (type field).
#
# Resolution
#   1. Read boundary.yml → active boundary type (e.g. web-service)
#   2. Load boundaries/<type>/sbe-form-lock/form-lock.profile.yml
#   3. Resolve templates relative to this file's directory (sbe-form-lock/)
#
# =============================================================================

boundary_type: web-service

# Rule headline prefix → Example form template (.tmpl in forms_root).
# Loader MUST sort by rule_prefix length descending before matching.
# Plain 「後置（狀態）」 is allowed.
rule_prefix_to_template:
  - rule_prefix: "前置（狀態"
    template: precondition-state.tmpl

  - rule_prefix: "前置（參數"
    template: precondition-param.tmpl

  - rule_prefix: "後置（回應"
    template: postcondition-response.tmpl

  - rule_prefix: "後置（狀態"
    template: postcondition-state.tmpl